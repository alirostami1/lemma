name: Feature
description: Propose product capability
title: "<area>: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use one issue per logical feature. Title format: `<area>: <problem or outcome>`.

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What user outcome should this create?
    validations:
      required: true

  - type: textarea
    id: user-flow
    attributes:
      label: User flow
      description: How should the user experience it?
    validations:
      required: true

  - type: textarea
    id: desired-outcome
    attributes:
      label: Desired outcome
      description: What should be true after this is done?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be included?
      placeholder: |
        -
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What should not be included?
      placeholder: |
        -
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: What proves this is done?
      placeholder: |
        -
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Commands/checks that should pass.
      placeholder: |
        - `pnpm check:types`
        - `pnpm check`
        - `pnpm test`
    validations:
      required: true

  - type: textarea
    id: risk
    attributes:
      label: Risk
      description: API, migration, deploy, data, security, or compatibility risks.
      placeholder: |
        - None known

  - type: textarea
    id: changelog
    attributes:
      label: Changelog impact
      description: User-facing, API, migration, deployment, or developer-workflow note.
      placeholder: |
        - Notable changelog note:
        - Or: no changelog note needed because ...
