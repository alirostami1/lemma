name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Defaults to the current commit SHA."
        required: false
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}

jobs:
  build:
    name: build and push images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: lemma-api
            dockerfile: apps/api/Dockerfile
          - image: lemma-worker
            dockerfile: apps/worker/Dockerfile
          - image: lemma-web
            dockerfile: apps/web/Dockerfile
          - image: lemma-admin
            dockerfile: apps/admin/Dockerfile
          - image: lemma-keycloak
            dockerfile: apps/keycloak-theme/Dockerfile
          - image: lemma-libreoffice-worker
            dockerfile: apps/libreoffice-worker/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: |
            LEMMA_WEB_APP_TITLE=${{ vars.LEMMA_WEB_APP_TITLE }}
            LEMMA_WEB_APP_URL=${{ vars.LEMMA_WEB_APP_URL }}
            LEMMA_WEB_API_URL=${{ vars.LEMMA_WEB_API_URL }}
            LEMMA_WEB_REALTIME_URL=${{ vars.LEMMA_WEB_REALTIME_URL }}
            LEMMA_WEB_OIDC_ISSUER_URI=${{ vars.LEMMA_WEB_OIDC_ISSUER_URI }}
            LEMMA_WEB_OIDC_CLIENT_ID=${{ vars.LEMMA_WEB_OIDC_CLIENT_ID }}
            LEMMA_ADMIN_APP_TITLE=${{ vars.LEMMA_ADMIN_APP_TITLE }}
            LEMMA_ADMIN_APP_URL=${{ vars.LEMMA_ADMIN_APP_URL }}
            LEMMA_ADMIN_API_URL=${{ vars.LEMMA_ADMIN_API_URL }}
            LEMMA_ADMIN_OIDC_ISSUER_URI=${{ vars.LEMMA_ADMIN_OIDC_ISSUER_URI }}
            LEMMA_ADMIN_OIDC_CLIENT_ID=${{ vars.LEMMA_ADMIN_OIDC_CLIENT_ID }}

  deploy:
    name: deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: vps
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      - name: Upload deploy files
        run: |
          ssh -o StrictHostKeyChecking=accept-new "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}" "mkdir -p /opt/lemma/infra/production /opt/lemma/infra/garage /opt/lemma/scripts/production"
          scp infra/production/compose.yml infra/production/Caddyfile "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}:/opt/lemma/infra/production/"
          scp infra/garage/garage.toml "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}:/opt/lemma/infra/garage/"
          scp scripts/production/deploy.sh scripts/production/rollback.sh scripts/production/backup.sh "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}:/opt/lemma/scripts/production/"
      - name: Login VPS to GHCR
        env:
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          printf '%s' "$GHCR_READ_TOKEN" | ssh "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}" "docker login ghcr.io -u '$GHCR_READ_USER' --password-stdin"
      - name: Deploy
        run: |
          ssh "${{ secrets.VPS_DEPLOY_USER }}@${{ secrets.VPS_HOST }}" "chmod +x /opt/lemma/scripts/production/*.sh && LEMMA_IMAGE_TAG='${{ env.IMAGE_TAG }}' /opt/lemma/scripts/production/deploy.sh"
