name: Deploy VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Defaults to the current commit SHA."
        required: false
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - ".github/workflows/deploy-vps.yml"
      - ".npmrc"
      - "apps/api/**"
      - "apps/admin/**"
      - "apps/keycloak-theme/**"
      - "apps/libreoffice-worker/**"
      - "apps/web/**"
      - "apps/worker/**"
      - "infra/ansible/**"
      - "infra/caddy/**"
      - "infra/production/**"
      - "package.json"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "scripts/run-openapi-generator.mjs"
      - "scripts/production/**"
      - "tsconfig*.json"
      - "turbo.json"
      - "!apps/**/*.md"
      - "!packages/**/*.md"

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-vps
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}
  IMAGE_TAG: ${{ github.event.inputs.image_tag || github.sha }}
  SOPS_VERSION: v3.10.2

jobs:
  build:
    name: build and push images
    runs-on: ubuntu-latest
    environment: vps
    strategy:
      matrix:
        include:
          - image: lemma-api
            dockerfile: apps/api/Dockerfile
          - image: lemma-worker
            dockerfile: apps/worker/Dockerfile
          - image: lemma-web
            dockerfile: apps/web/Dockerfile
          - image: lemma-admin
            dockerfile: apps/admin/Dockerfile
          - image: lemma-keycloak
            dockerfile: apps/keycloak-theme/Dockerfile
          - image: lemma-libreoffice-worker
            dockerfile: apps/libreoffice-worker/Dockerfile
          - image: lemma-caddy
            dockerfile: infra/caddy/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
          build-args: |
            LEMMA_WEB_APP_TITLE=${{ vars.LEMMA_WEB_APP_TITLE }}
            LEMMA_WEB_APP_URL=${{ vars.LEMMA_WEB_APP_URL }}
            LEMMA_WEB_API_URL=${{ vars.LEMMA_WEB_API_URL }}
            LEMMA_WEB_REALTIME_URL=${{ vars.LEMMA_WEB_REALTIME_URL }}
            LEMMA_WEB_OIDC_ISSUER_URI=${{ vars.LEMMA_WEB_OIDC_ISSUER_URI }}
            LEMMA_WEB_OIDC_CLIENT_ID=${{ vars.LEMMA_WEB_OIDC_CLIENT_ID }}
            LEMMA_ADMIN_APP_TITLE=${{ vars.LEMMA_ADMIN_APP_TITLE }}
            LEMMA_ADMIN_APP_URL=${{ vars.LEMMA_ADMIN_APP_URL }}
            LEMMA_ADMIN_API_URL=${{ vars.LEMMA_ADMIN_API_URL }}
            LEMMA_ADMIN_OIDC_ISSUER_URI=${{ vars.LEMMA_ADMIN_OIDC_ISSUER_URI }}
            LEMMA_ADMIN_OIDC_CLIENT_ID=${{ vars.LEMMA_ADMIN_OIDC_CLIENT_ID }}

  deploy:
    name: deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    environment: vps
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Show deploy plan
        run: |
          echo "environment: vps"
          echo "image owner: ${IMAGE_OWNER}"
          echo "image tag: ${IMAGE_TAG}"
          echo "compose: infra/production/compose.yml"
          echo "playbook: infra/ansible/playbooks/deploy.yml"
      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      - name: Install deploy tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible curl
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" -o /tmp/sops
          sudo install -m 0755 /tmp/sops /usr/local/bin/sops
      - name: Prepare deploy inputs
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p .deploy ~/.ssh
          printf '%s' "$SOPS_AGE_KEY" > .deploy/age.key
          chmod 600 .deploy/age.key
          SOPS_AGE_KEY_FILE=.deploy/age.key sops --decrypt infra/production/production.sops.env > .deploy/vps.env
          chmod 600 .deploy/vps.env
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
      - name: Deploy with Ansible
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_DEPLOY_USER: ${{ secrets.VPS_DEPLOY_USER }}
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        run: |
          ansible-playbook infra/ansible/playbooks/deploy.yml \
            --extra-vars "ansible_host=${VPS_HOST}" \
            --extra-vars "ansible_user=${VPS_DEPLOY_USER}" \
            --extra-vars "lemma_image_tag=${IMAGE_TAG}" \
            --extra-vars "lemma_image_owner=${IMAGE_OWNER}" \
            --extra-vars "lemma_decrypted_env_file=${GITHUB_WORKSPACE}/.deploy/vps.env" \
            --extra-vars "lemma_ghcr_read_user=${GHCR_READ_USER}" \
            --extra-vars "lemma_ghcr_read_token=${GHCR_READ_TOKEN}"
      - name: Smoke check public endpoints
        run: scripts/production/smoke.sh .deploy/vps.env
