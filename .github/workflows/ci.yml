name: CI
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
jobs:
  validation:
    name: validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-
            turbo-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm check-types
      - name: Check formatting and lint
        run: pnpm check
      - name: Test
        run: pnpm test
