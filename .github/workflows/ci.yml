name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            app:
              - "apps/**"
              - "packages/**"
              - "package.json"
              - "pnpm-lock.yaml"
              - "pnpm-workspace.yaml"
              - "turbo.json"
              - "biome.json"
              - "tsconfig*.json"
            docs:
              - "AGENTS.md"
              - "DEVELOPMENT.md"
              - "README.md"
              - "docs/**"
            infra:
              - "infra/**"
              - "scripts/production/**"
            workflow:
              - ".github/workflows/**"

  docs-validation:
    name: docs validation
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check docs
        run: pnpm check:docs

  validation:
    name: validation
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-
            turbo-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm check-types
      - name: Check formatting and lint
        run: pnpm check
      - name: Test
        run: pnpm test

  ci-summary:
    name: ci summary
    needs:
      - changes
      - docs-validation
      - validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required CI jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          DOCS_RESULT: ${{ needs.docs-validation.result }}
          VALIDATION_RESULT: ${{ needs.validation.result }}
        run: |
          set -eu

          echo "changes: $CHANGES_RESULT"
          echo "docs-validation: $DOCS_RESULT"
          echo "validation: $VALIDATION_RESULT"

          if [ "$CHANGES_RESULT" != "success" ]; then
            exit 1
          fi

          for result in "$DOCS_RESULT" "$VALIDATION_RESULT"; do
            case "$result" in
              success|skipped)
                ;;
              *)
                exit 1
                ;;
            esac
          done
