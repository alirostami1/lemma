name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -eu

          if [ "$EVENT_NAME" = "pull_request" ]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$HEAD_SHA"
            if [ "$base" = "0000000000000000000000000000000000000000" ]; then
              base="$(git rev-parse "$head^")"
            fi
          fi

          app=false
          docs=false
          infra=false
          workflow=false

          while IFS= read -r file; do
            case "$file" in
              .github/workflows/*)
                workflow=true
                ;;
              AGENTS.md|DEVELOPMENT.md|README.md|docs/*)
                docs=true
                ;;
              infra/*|scripts/production/*)
                infra=true
                ;;
              apps/*|packages/*|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|turbo.json|biome.json|tsconfig*.json)
                app=true
                ;;
            esac
          done <<EOF
          $(git diff --name-only "$base" "$head")
          EOF

          {
            echo "app=$app"
            echo "docs=$docs"
            echo "infra=$infra"
            echo "workflow=$workflow"
          } >> "$GITHUB_OUTPUT"

  docs-validation:
    name: docs validation
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check docs
        run: pnpm check:docs

  validation:
    name: validation
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-
            turbo-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm check-types
      - name: Check formatting and lint
        run: pnpm check
      - name: Test
        run: pnpm test
