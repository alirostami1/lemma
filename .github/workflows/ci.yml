name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
      docs: ${{ steps.filter.outputs.docs }}
      infra: ${{ steps.filter.outputs.infra }}
      workflow: ${{ steps.filter.outputs.workflow }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Classify changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: .github/path-filters/ci.yml

  pull-request-conventions:
    name: pull request conventions
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Check branch, title, and issue link
        env:
          PR_BRANCH: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -eu

          conventional='^(fix|feat|chore|docs|test|refactor|ci|build)\([a-z0-9-]+\): .+'
          branch='^(fix|feat|chore|docs|test|refactor|ci|build)/[0-9]+-[a-z0-9][a-z0-9-]*$'

          if ! printf '%s' "$PR_BRANCH" | grep -Eq "$branch"; then
            echo "Branch must match: <type>/<issue-number>-<short-slug>"
            exit 1
          fi

          if ! printf '%s' "$PR_TITLE" | grep -Eq "$conventional"; then
            echo "PR title must match: <type>(<scope>): <imperative summary>"
            exit 1
          fi

          if ! printf '%s' "$PR_BODY" | grep -Eiq '(^|[[:space:]])Closes #[0-9]+'; then
            echo "PR body must include: Closes #<issue-number>"
            exit 1
          fi

  docs-validation:
    name: docs validation
    needs: changes
    if: needs.changes.outputs.docs == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check docs
        run: pnpm check:docs

  validation:
    name: validation
    needs: changes
    if: |
      needs.changes.outputs.app == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.1.3
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
      - name: Cache Turbo
        uses: actions/cache@v5
        with:
          path: .turbo/cache
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', 'package.json', 'apps/*/package.json', 'packages/*/package.json') }}-
            turbo-${{ runner.os }}-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check types
        run: pnpm check-types
      - name: Check formatting and lint
        run: pnpm check
      - name: Test
        run: pnpm test

  infra-validation:
    name: infra validation
    needs: changes
    if: |
      needs.changes.outputs.infra == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install infra validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible shellcheck yamllint
      - name: Check shell scripts
        run: shellcheck --severity=error scripts/production/*.sh
      - name: Check YAML
        run: yamllint .github/workflows .github/path-filters infra/ansible
      - name: Check Ansible syntax
        env:
          ANSIBLE_CONFIG: infra/ansible/ansible.cfg
        run: |
          for playbook in infra/ansible/playbooks/*.yml; do
            echo "Checking $playbook"
            ansible-playbook "$playbook" \
              --syntax-check \
              --extra-vars "lemma_decrypted_env_file=/tmp/vps.env" \
              --extra-vars "lemma_image_tag=syntax-check" \
              --extra-vars "lemma_image_owner=syntax-check" \
              --extra-vars "lemma_ghcr_read_user=syntax-check" \
              --extra-vars "lemma_ghcr_read_token=syntax-check"
          done

  ci-summary:
    name: ci summary
    needs:
      - changes
      - pull-request-conventions
      - docs-validation
      - validation
      - infra-validation
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check required CI jobs
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          PR_CONVENTIONS_RESULT: ${{ needs.pull-request-conventions.result }}
          DOCS_RESULT: ${{ needs.docs-validation.result }}
          VALIDATION_RESULT: ${{ needs.validation.result }}
          INFRA_VALIDATION_RESULT: ${{ needs.infra-validation.result }}
        run: |
          set -eu

          echo "changes: $CHANGES_RESULT"
          echo "pull-request-conventions: $PR_CONVENTIONS_RESULT"
          echo "docs-validation: $DOCS_RESULT"
          echo "validation: $VALIDATION_RESULT"
          echo "infra-validation: $INFRA_VALIDATION_RESULT"

          if [ "$CHANGES_RESULT" != "success" ]; then
            exit 1
          fi

          for result in "$PR_CONVENTIONS_RESULT" "$DOCS_RESULT" "$VALIDATION_RESULT" "$INFRA_VALIDATION_RESULT"; do
            case "$result" in
              success|skipped)
                ;;
              *)
                exit 1
                ;;
            esac
          done
