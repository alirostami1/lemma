---
- name: Install Docker apt prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-apt
      - ufw
    state: present
    update_cache: true

- name: Ensure Docker apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Docker apt key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Configure Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    state: present

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: "{{ lemma_deploy_user }}"
    groups:
      - docker
      - sudo
    append: true
    shell: /bin/bash
    state: present

- name: Ensure Lemma directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ lemma_deploy_user }}"
    group: "{{ lemma_deploy_user }}"
    mode: "0700"
  loop:
    - "{{ lemma_root }}"
    - "{{ lemma_root }}/infra/production"
    - "{{ lemma_root }}/infra/garage"
    - "{{ lemma_root }}/scripts/production"
    - "{{ lemma_root }}/backups"

- name: Allow SSH through firewall
  ansible.builtin.command:
    cmd: "ufw allow {{ lemma_ssh_port }}/tcp"
  changed_when: false

- name: Allow HTTP through firewall
  ansible.builtin.command:
    cmd: ufw allow 80/tcp
  changed_when: false

- name: Allow HTTPS through firewall
  ansible.builtin.command:
    cmd: ufw allow 443/tcp
  changed_when: false

- name: Enable firewall
  ansible.builtin.command:
    cmd: ufw --force enable
  changed_when: false
