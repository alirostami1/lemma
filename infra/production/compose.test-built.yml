  LEMMA_WORKER_DATABASE_URL: postgres://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD_URL_ENCODED:-lemma}@postgres:5432/${POSTGRES_DB:-lemma}?sslmode=disable
  LEMMA_WORKER_ID: ${LEMMA_WORKER_ID:-lemma-worker-local-image-test}
  LEMMA_WORKER_OUTBOX_BATCH_SIZE: ${LEMMA_WORKER_OUTBOX_BATCH_SIZE:-25}
  LEMMA_WORKER_OUTBOX_POLL_INTERVAL_MS: ${LEMMA_WORKER_OUTBOX_POLL_INTERVAL_MS:-1000}
  LEMMA_WORKER_OUTBOX_LOCK_TIMEOUT_MS: ${LEMMA_WORKER_OUTBOX_LOCK_TIMEOUT_MS:-60000}
  LEMMA_WORKER_OUTBOX_RETRY_DELAY_MS: ${LEMMA_WORKER_OUTBOX_RETRY_DELAY_MS:-5000}
  LEMMA_WORKER_OUTBOX_MAX_ATTEMPTS: ${LEMMA_WORKER_OUTBOX_MAX_ATTEMPTS:-10}
  LEMMA_WORKER_OUTBOX_CLEANUP_INTERVAL_MS: ${LEMMA_WORKER_OUTBOX_CLEANUP_INTERVAL_MS:-3600000}
  LEMMA_WORKER_OUTBOX_CLEANUP_BATCH_SIZE: ${LEMMA_WORKER_OUTBOX_CLEANUP_BATCH_SIZE:-500}
  LEMMA_WORKER_OUTBOX_PUBLISHED_RETENTION_MS: ${LEMMA_WORKER_OUTBOX_PUBLISHED_RETENTION_MS:-604800000}
  LEMMA_WORKER_QUESTION_GENERATION_CONCURRENCY: ${LEMMA_WORKER_QUESTION_GENERATION_CONCURRENCY:-1}
  LEMMA_WORKER_WORKBOOK_VALIDATION_CONCURRENCY: ${LEMMA_WORKER_WORKBOOK_VALIDATION_CONCURRENCY:-1}
  LEMMA_WORKER_WORKBOOK_CALCULATION_CONCURRENCY: ${LEMMA_WORKER_WORKBOOK_CALCULATION_CONCURRENCY:-1}
  LEMMA_WORKER_QUEUE_RETRY_LIMIT: ${LEMMA_WORKER_QUEUE_RETRY_LIMIT:-3}
  LEMMA_WORKER_QUEUE_RETRY_DELAY_SECONDS: ${LEMMA_WORKER_QUEUE_RETRY_DELAY_SECONDS:-30}
  LEMMA_WORKER_FAILED_QUEUE_RECONCILE_INTERVAL_MS: ${LEMMA_WORKER_FAILED_QUEUE_RECONCILE_INTERVAL_MS:-10000}
  LEMMA_WORKER_FAILED_QUEUE_RECONCILE_BATCH_SIZE: ${LEMMA_WORKER_FAILED_QUEUE_RECONCILE_BATCH_SIZE:-25}
  LEMMA_WORKER_FAILED_QUEUE_RECONCILE_LOCK_TIMEOUT_MS: ${LEMMA_WORKER_FAILED_QUEUE_RECONCILE_LOCK_TIMEOUT_MS:-60000}

x-web-env: &web-env
  NODE_ENV: production
  HOST: 0.0.0.0
  PORT: 3000
  LEMMA_WEB_APP_TITLE: ${LEMMA_WEB_APP_TITLE:-Lemma}
  LEMMA_WEB_APP_URL: ${LEMMA_WEB_APP_URL:-http://localhost:3000}
  LEMMA_WEB_API_URL: ${LEMMA_WEB_API_URL:-http://localhost:3001}
  LEMMA_WEB_REALTIME_URL: ${LEMMA_WEB_REALTIME_URL:-ws://localhost:8000/connection/websocket}
  LEMMA_WEB_OIDC_ISSUER_URI: ${LEMMA_WEB_OIDC_ISSUER_URI:-http://localhost:8001/realms/lemma}
  LEMMA_WEB_OIDC_CLIENT_ID: ${LEMMA_WEB_OIDC_CLIENT_ID:-lemma-web}

x-admin-env: &admin-env
  LEMMA_ADMIN_APP_TITLE: ${LEMMA_ADMIN_APP_TITLE:-Lemma Admin}
  LEMMA_ADMIN_APP_URL: ${LEMMA_ADMIN_APP_URL:-http://localhost:3003}
  LEMMA_ADMIN_API_URL: ${LEMMA_ADMIN_API_URL:-http://localhost:3001}
  LEMMA_ADMIN_OIDC_ISSUER_URI: ${LEMMA_ADMIN_OIDC_ISSUER_URI:-http://localhost:8001/realms/lemma}
  LEMMA_ADMIN_OIDC_CLIENT_ID: ${LEMMA_ADMIN_OIDC_CLIENT_ID:-lemma-admin}

x-api-healthcheck: &api-healthcheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
    ]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

x-web-healthcheck: &web-healthcheck
  test:
    [
      "CMD",
      "node",
      "-e",
      "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
    ]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

x-admin-healthcheck: &admin-healthcheck
  test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
  interval: 10s
  timeout: 5s
  retries: 12
  start_period: 20s

services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lemma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lemma}
      POSTGRES_DB: ${POSTGRES_DB:-lemma}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${POSTGRES_PUBLIC_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - lemma

  garage:
    image: docker.io/dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    restart: unless-stopped
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: ${GARAGE_DEFAULT_ACCESS_KEY:-garagelemma}
      GARAGE_DEFAULT_SECRET_KEY: ${GARAGE_DEFAULT_SECRET_KEY:-lemma-garage-secret-key}
      GARAGE_DEFAULT_BUCKET: ${LEMMA_S3_BUCKET:-lemma-files}
    ports:
      - "127.0.0.1:${GARAGE_S3_API_PORT:-3900}:3900"
    volumes:
      - ../garage/garage.toml:/etc/garage.toml:ro
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
    networks:
      - lemma

  garage-cors:
    image: docker.io/amazon/aws-cli:latest
    depends_on:
      garage:
        condition: service_started
    entrypoint: ["/bin/sh"]
    command:
      - -ceu
      - |
        bucket="$${LEMMA_S3_BUCKET:-lemma-files}"
        endpoint="http://garage:3900"
        cat > /tmp/cors.json <<EOF
        {"CORSRules":[{"AllowedOrigins":["$${LEMMA_WEB_APP_URL}"],"AllowedMethods":["PUT","GET","HEAD"],"AllowedHeaders":["*"],"ExposeHeaders":["ETag"],"MaxAgeSeconds":3000}]}
        EOF
        until aws s3api head-bucket --endpoint-url "$${endpoint}" --bucket "$${bucket}" >/dev/null 2>&1; do sleep 1; done
        aws s3api put-bucket-cors --endpoint-url "$${endpoint}" --bucket "$${bucket}" --cors-configuration file:///tmp/cors.json
    environment:
      AWS_ACCESS_KEY_ID: ${GARAGE_DEFAULT_ACCESS_KEY:-garagelemma}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_DEFAULT_SECRET_KEY:-lemma-garage-secret-key}
      AWS_DEFAULT_REGION: garage
      LEMMA_S3_BUCKET: ${LEMMA_S3_BUCKET:-lemma-files}
      LEMMA_WEB_APP_URL: ${LEMMA_WEB_APP_URL:-http://localhost:3000}
    networks:
      - lemma
    restart: "no"

  postgres-keycloak:
    image: docker.io/library/postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${KC_POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${KC_POSTGRES_PASSWORD:-keycloak}
      POSTGRES_DB: ${KC_POSTGRES_DB:-keycloak}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "127.0.0.1:${KC_POSTGRES_PUBLIC_PORT:-8002}:5432"
    volumes:
      - postgres-keycloak-data:/var/lib/postgresql
    networks:
      - lemma

  keycloak:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-keycloak:${LEMMA_SHARED_IMAGE_TAG:-test}
    restart: unless-stopped
    command: ["start", "--optimized", "--import-realm"]
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: postgres-keycloak
      KC_DB_USERNAME: ${KC_POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${KC_POSTGRES_PASSWORD:-keycloak}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PW:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: ${KC_HOSTNAME:-http://localhost:8001}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      postgres-keycloak:
        condition: service_healthy
    ports:
      - "127.0.0.1:${KC_HTTP_PORT:-8001}:8080"
    volumes:
      - ../keycloak-realm.json:/opt/keycloak/data/import/lemma-realm.json:ro
    networks:
      - lemma

  centrifugo:
    image: docker.io/centrifugo/centrifugo:${LEMMA_CENTRIFUGO_IMAGE_TAG:-v6}
    restart: unless-stopped
    environment:
      CENTRIFUGO_CLIENT_ALLOWED_ORIGINS: ${LEMMA_WEB_APP_URL:-http://localhost:3000}
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${LEMMA_CENTRIFUGO_TOKEN_HMAC_SECRET_KEY:-lemma-centrifugo-token-secret-key-32chars}
      CENTRIFUGO_CHANNEL_NAMESPACES: '[{"name":"user"},{"name":"question-generation-run"},{"name":"question-set"}]'
      CENTRIFUGO_HTTP_API_KEY: ${LEMMA_CENTRIFUGO_HTTP_API_KEY:-lemma-centrifugo-api-key}
      CENTRIFUGO_HTTP_SERVER_PORT: 8000
      CENTRIFUGO_LOG_LEVEL: ${LEMMA_CENTRIFUGO_LOG_LEVEL:-info}
    ports:
      - "127.0.0.1:${LEMMA_CENTRIFUGO_PORT:-8000}:8000"
    networks:
      - lemma

  libreoffice-worker:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-libreoffice-worker:${LEMMA_SHARED_IMAGE_TAG:-test}
    restart: unless-stopped
    environment:
      WORKBOOK_WORKER_HOST: 0.0.0.0
      WORKBOOK_WORKER_PORT: 8080
      WORKBOOK_WORKER_MAX_UPLOAD_BYTES: ${LEMMA_WORKBOOK_MAX_FILE_BYTES:-20971520}
      WORKBOOK_WORKER_MAX_RESPONSE_BYTES: ${LEMMA_WORKBOOK_MAX_RESPONSE_BYTES:-10485760}
      WORKBOOK_WORKER_TIMEOUT_SECONDS: ${LEMMA_WORKBOOK_LIBREOFFICE_WORKER_TIMEOUT_SECONDS:-30}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/v1/health >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    ports:
      - "127.0.0.1:${LEMMA_WORKBOOK_LIBREOFFICE_WORKER_PORT:-8080}:8080"
    networks:
      - lemma

  migrate:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-api:${LEMMA_SHARED_IMAGE_TAG:-test}
    command: ["node", "/repo/packages/db/dist/migrate.js", "latest"]
    environment:
      NODE_ENV: production
      LEMMA_DATABASE_URL: postgres://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD_URL_ENCODED:-lemma}@postgres:5432/${POSTGRES_DB:-lemma}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lemma
    restart: "no"

  api:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-api:${LEMMA_IMAGE_TAG:-test}
    restart: unless-stopped
    environment: *api-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      garage-cors:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      libreoffice-worker:
        condition: service_healthy
      centrifugo:
        condition: service_started
    healthcheck: *api-healthcheck
    ports:
      - "127.0.0.1:${LEMMA_API_PORT:-3001}:3000"
    networks:
      - lemma

  worker:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-worker:${LEMMA_SHARED_IMAGE_TAG:-test}
    restart: unless-stopped
    environment: *worker-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      garage-cors:
        condition: service_completed_successfully
      libreoffice-worker:
        condition: service_healthy
      centrifugo:
        condition: service_started
    stop_grace_period: 30s
    networks:
      - lemma

  web:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-web:${LEMMA_IMAGE_TAG:-test}
    restart: unless-stopped
    environment: *web-env
    depends_on:
      api:
        condition: service_healthy
      centrifugo:
        condition: service_started
    healthcheck: *web-healthcheck
    ports:
      - "127.0.0.1:${LEMMA_WEB_PORT:-3000}:3000"
    networks:
      - lemma

  admin:
    image: ghcr.io/${LEMMA_IMAGE_OWNER:-local}/lemma-admin:${LEMMA_IMAGE_TAG:-test}
    restart: unless-stopped
    environment: *admin-env
    depends_on:
      api:
        condition: service_healthy
    healthcheck: *admin-healthcheck
    ports:
      - "127.0.0.1:${LEMMA_ADMIN_PORT:-3003}:8080"
    networks:
      - lemma

volumes:
  postgres-data:
  postgres-keycloak-data:
  garage-data:
  garage-meta:

networks:
  lemma:
    driver: bridge
