x-lemma-runtime-env: &lemma-runtime-env
  NODE_ENV: production
  LEMMA_S3_REGION: ${LEMMA_S3_REGION:-garage}
  LEMMA_S3_BUCKET: ${LEMMA_S3_BUCKET:-lemma-files}
  LEMMA_S3_ACCESS_KEY_ID: ${GARAGE_DEFAULT_ACCESS_KEY:-garagelemma}
  LEMMA_S3_SECRET_ACCESS_KEY: ${GARAGE_DEFAULT_SECRET_KEY:-lemma-garage-secret-key}
  LEMMA_S3_ENDPOINT: http://garage:3900
  LEMMA_S3_FORCE_PATH_STYLE: "true"
  LEMMA_S3_UPLOAD_URL_EXPIRES_IN_SECONDS: ${LEMMA_S3_UPLOAD_URL_EXPIRES_IN_SECONDS:-900}
  LEMMA_S3_DOWNLOAD_URL_EXPIRES_IN_SECONDS: ${LEMMA_S3_DOWNLOAD_URL_EXPIRES_IN_SECONDS:-900}
  LEMMA_WORKBOOK_ENGINE: ${LEMMA_WORKBOOK_ENGINE:-libreoffice}
  LEMMA_WORKBOOK_LIBREOFFICE_SERVICE_URL: http://libreoffice-worker:8080
  LEMMA_WORKBOOK_ENGINE_TIMEOUT_MS: ${LEMMA_WORKBOOK_ENGINE_TIMEOUT_MS:-30000}
  LEMMA_WORKBOOK_VALIDATION_TIMEOUT_MS: ${LEMMA_WORKBOOK_VALIDATION_TIMEOUT_MS:-30000}
  LEMMA_WORKBOOK_MAX_FILE_BYTES: ${LEMMA_WORKBOOK_MAX_FILE_BYTES:-20971520}
  LEMMA_WORKBOOK_MAX_SHEETS: ${LEMMA_WORKBOOK_MAX_SHEETS:-50}
  LEMMA_WORKBOOK_MAX_CELLS: ${LEMMA_WORKBOOK_MAX_CELLS:-500000}
  LEMMA_WORKBOOK_MAX_FORMULAS: ${LEMMA_WORKBOOK_MAX_FORMULAS:-50000}
  LEMMA_WORKBOOK_MAX_RESPONSE_BYTES: ${LEMMA_WORKBOOK_MAX_RESPONSE_BYTES:-10485760}
  LEMMA_CENTRIFUGO_PUBLIC_URL: ${LEMMA_CENTRIFUGO_PUBLIC_URL:-http://localhost:8000}
  LEMMA_CENTRIFUGO_HTTP_API_URL: http://centrifugo:8000/api
  LEMMA_CENTRIFUGO_HTTP_API_KEY: ${LEMMA_CENTRIFUGO_HTTP_API_KEY:-lemma-centrifugo-api-key}
  LEMMA_CENTRIFUGO_TOKEN_HMAC_SECRET_KEY: ${LEMMA_CENTRIFUGO_TOKEN_HMAC_SECRET_KEY:-lemma-centrifugo-token-secret-key-32chars}
  LEMMA_CENTRIFUGO_TOKEN_TTL_SECONDS: ${LEMMA_CENTRIFUGO_TOKEN_TTL_SECONDS:-3600}
  LEMMA_OTEL_ENABLED: ${LEMMA_OTEL_ENABLED:-true}
  LEMMA_OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
  LEMMA_OTEL_METRIC_EXPORT_INTERVAL_MS: ${LEMMA_OTEL_METRIC_EXPORT_INTERVAL_MS:-30000}

x-lemma-service: &lemma-service
  restart: unless-stopped
  networks:
    - lemma

services:
  migrate:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: localhost/lemma-api:${LEMMA_IMAGE_TAG:-local}
    command: ["node", "/repo/packages/db/dist/migrate.js", "latest"]
    environment:
      NODE_ENV: production
      LEMMA_DATABASE_URL: postgres://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD:-lemma}@postgres:5432/${POSTGRES_DB:-lemma}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - lemma
    restart: "no"

  seed-dev-users:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: localhost/lemma-api:${LEMMA_IMAGE_TAG:-local}
    command: ["node", "/repo/packages/db/dist/seed-dev.js"]
    environment:
      NODE_ENV: production
      LEMMA_DATABASE_URL: postgres://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD:-lemma}@postgres:5432/${POSTGRES_DB:-lemma}?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - lemma
    restart: "no"

  api:
    <<: *lemma-service
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: localhost/lemma-api:${LEMMA_IMAGE_TAG:-local}
    environment:
      <<: *lemma-runtime-env
      LEMMA_API_PORT: 3000
      LEMMA_API_DATABASE_URL: postgres://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD:-lemma}@postgres:5432/${POSTGRES_DB:-lemma}?sslmode=disable
      LEMMA_API_WEB_ORIGINS: ${LEMMA_API_WEB_ORIGINS:-http://localhost:3000,http://localhost:3003}
      LEMMA_OIDC_ISSUER_URL: ${LEMMA_OIDC_ISSUER_URL:-http://localhost:8001/realms/lemma}
      LEMMA_OIDC_JWKS_URL: ${LEMMA_OIDC_JWKS_URL:-http://keycloak:8080/realms/lemma/protocol/openid-connect/certs}
      LEMMA_OIDC_AUDIENCE: ${LEMMA_OIDC_AUDIENCE:-lemma-api}
    depends_on:
      seed-dev-users:
        condition: service_completed_successfully
      keycloak:
        condition: service_started
      garage-cors:
        condition: service_completed_successfully
      libreoffice-worker:
        condition: service_started
      centrifugo:
        condition: service_started
      otel-collector:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "${LEMMA_API_PORT:-3001}:3000"

  worker:
    <<: *lemma-service
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    image: localhost/lemma-worker:${LEMMA_IMAGE_TAG:-local}
    environment:
      <<: *lemma-runtime-env
      LEMMA_WORKER_DATABASE_URL: postgres://${POSTGRES_USER:-lemma}:${POSTGRES_PASSWORD:-lemma}@postgres:5432/${POSTGRES_DB:-lemma}?sslmode=disable
      LEMMA_WORKER_ID: ${LEMMA_WORKER_ID:-lemma-worker-local}
      LEMMA_WORKER_OUTBOX_BATCH_SIZE: ${LEMMA_WORKER_OUTBOX_BATCH_SIZE:-25}
      LEMMA_WORKER_OUTBOX_POLL_INTERVAL_MS: ${LEMMA_WORKER_OUTBOX_POLL_INTERVAL_MS:-1000}
      LEMMA_WORKER_OUTBOX_LOCK_TIMEOUT_MS: ${LEMMA_WORKER_OUTBOX_LOCK_TIMEOUT_MS:-60000}
      LEMMA_WORKER_OUTBOX_RETRY_DELAY_MS: ${LEMMA_WORKER_OUTBOX_RETRY_DELAY_MS:-5000}
      LEMMA_WORKER_OUTBOX_MAX_ATTEMPTS: ${LEMMA_WORKER_OUTBOX_MAX_ATTEMPTS:-10}
      LEMMA_WORKER_OUTBOX_CLEANUP_INTERVAL_MS: ${LEMMA_WORKER_OUTBOX_CLEANUP_INTERVAL_MS:-3600000}
      LEMMA_WORKER_OUTBOX_CLEANUP_BATCH_SIZE: ${LEMMA_WORKER_OUTBOX_CLEANUP_BATCH_SIZE:-500}
      LEMMA_WORKER_OUTBOX_PUBLISHED_RETENTION_MS: ${LEMMA_WORKER_OUTBOX_PUBLISHED_RETENTION_MS:-604800000}
      LEMMA_WORKER_QUESTION_GENERATION_CONCURRENCY: ${LEMMA_WORKER_QUESTION_GENERATION_CONCURRENCY:-1}
      LEMMA_WORKER_WORKBOOK_VALIDATION_CONCURRENCY: ${LEMMA_WORKER_WORKBOOK_VALIDATION_CONCURRENCY:-1}
      LEMMA_WORKER_WORKBOOK_CALCULATION_CONCURRENCY: ${LEMMA_WORKER_WORKBOOK_CALCULATION_CONCURRENCY:-1}
      LEMMA_WORKER_QUEUE_RETRY_LIMIT: ${LEMMA_WORKER_QUEUE_RETRY_LIMIT:-3}
      LEMMA_WORKER_QUEUE_RETRY_DELAY_SECONDS: ${LEMMA_WORKER_QUEUE_RETRY_DELAY_SECONDS:-30}
      LEMMA_WORKER_FAILED_QUEUE_RECONCILE_INTERVAL_MS: ${LEMMA_WORKER_FAILED_QUEUE_RECONCILE_INTERVAL_MS:-10000}
      LEMMA_WORKER_FAILED_QUEUE_RECONCILE_BATCH_SIZE: ${LEMMA_WORKER_FAILED_QUEUE_RECONCILE_BATCH_SIZE:-25}
      LEMMA_WORKER_FAILED_QUEUE_RECONCILE_LOCK_TIMEOUT_MS: ${LEMMA_WORKER_FAILED_QUEUE_RECONCILE_LOCK_TIMEOUT_MS:-60000}
    depends_on:
      seed-dev-users:
        condition: service_completed_successfully
      garage-cors:
        condition: service_completed_successfully
      libreoffice-worker:
        condition: service_started
      centrifugo:
        condition: service_started
      otel-collector:
        condition: service_started
    stop_grace_period: 30s

  web:
    <<: *lemma-service
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        LEMMA_WEB_APP_TITLE: ${LEMMA_WEB_APP_TITLE:-Lemma}
        LEMMA_WEB_APP_URL: ${LEMMA_WEB_APP_URL:-http://localhost:3000}
        LEMMA_WEB_API_URL: ${LEMMA_WEB_API_URL:-http://localhost:3001}
        LEMMA_WEB_REALTIME_URL: ${LEMMA_WEB_REALTIME_URL:-ws://localhost:8000/connection/websocket}
        LEMMA_WEB_OIDC_ISSUER_URI: ${LEMMA_WEB_OIDC_ISSUER_URI:-http://localhost:8001/realms/lemma}
        LEMMA_WEB_OIDC_CLIENT_ID: ${LEMMA_WEB_OIDC_CLIENT_ID:-lemma-web}
    image: localhost/lemma-web:${LEMMA_IMAGE_TAG:-local}
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LEMMA_WEB_APP_TITLE: ${LEMMA_WEB_APP_TITLE:-Lemma}
      LEMMA_WEB_APP_URL: ${LEMMA_WEB_APP_URL:-http://localhost:3000}
      LEMMA_WEB_API_URL: ${LEMMA_WEB_API_URL:-http://localhost:3001}
      LEMMA_WEB_REALTIME_URL: ${LEMMA_WEB_REALTIME_URL:-ws://localhost:8000/connection/websocket}
      LEMMA_WEB_OIDC_ISSUER_URI: ${LEMMA_WEB_OIDC_ISSUER_URI:-http://localhost:8001/realms/lemma}
      LEMMA_WEB_OIDC_CLIENT_ID: ${LEMMA_WEB_OIDC_CLIENT_ID:-lemma-web}
    depends_on:
      api:
        condition: service_healthy
      centrifugo:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "${LEMMA_WEB_PORT:-3000}:3000"

  admin:
    <<: *lemma-service
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        LEMMA_ADMIN_APP_TITLE: ${LEMMA_ADMIN_APP_TITLE:-Lemma Admin}
        LEMMA_ADMIN_APP_URL: ${LEMMA_ADMIN_APP_URL:-http://localhost:3003}
        LEMMA_ADMIN_API_URL: ${LEMMA_ADMIN_API_URL:-http://localhost:3001}
        LEMMA_ADMIN_OIDC_ISSUER_URI: ${LEMMA_ADMIN_OIDC_ISSUER_URI:-http://localhost:8001/realms/lemma}
        LEMMA_ADMIN_OIDC_CLIENT_ID: ${LEMMA_ADMIN_OIDC_CLIENT_ID:-lemma-admin}
    image: localhost/lemma-admin:${LEMMA_IMAGE_TAG:-local}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "http://127.0.0.1:8080/",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    ports:
      - "${LEMMA_ADMIN_PORT:-3003}:8080"

networks:
  lemma:
    driver: bridge
